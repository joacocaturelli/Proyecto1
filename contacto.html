<!DOCTYPE html>
<html lang="es">
  <!-- metadata -->
  <head>
    <!-- Titulo de la pagina -->
    <title>Contacto - CV & Portfolio de Joaquín Caturelli</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Descripcion de la pagina -->
    <meta name="description" content="Formulario de contacto del portfolio" />
    <!-- Enlaces a los archivos de estilo -->
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/styles.css" />
    <!-- Icono de la pagina -->
    <link
      rel="icon"
      type="image/png"
      href="https://res.cloudinary.com/do0white9/image/upload/v1773181650/Bootcamp/Proyecto-1/joaquin_circulo_eba1c5.png"
    />
  </head>

  <body>
    <!-- Encabezado de la pagina -->
    <header id="main-header" class="header"></header>

    <main class="main">
      <div class="container">
        <section id="contacto" class="hero">
          <h2>Contacto</h2>
          <p class="contacto-intro">
            ¿Tienes alguna pregunta o propuesta? Rellena el formulario y me
            pondré en contacto contigo lo antes posible.
          </p>
          <div class="contacto-container">
            <form class="form">
              <div class="form-group">
                <label for="nombre">Nombre:</label>
                <input
                  type="text"
                  id="nombre"
                  name="nombre"
                  placeholder="Tu nombre"
                  required
                />
              </div>
              <div class="form-group">
                <label for="email">Email:</label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="tu@email.com"
                  required
                />
              </div>
              <div class="form-group">
                <label for="asunto">Asunto:</label>
                <input
                  type="text"
                  id="asunto"
                  name="asunto"
                  placeholder="Asunto del mensaje"
                  required
                />
              </div>
              <div class="form-group">
                <label for="mensaje">Mensaje:</label>
                <textarea
                  name="mensaje"
                  id="mensaje"
                  rows="10"
                  placeholder="Escribe tu mensaje aqui..."
                  required
                ></textarea>
              </div>
              <div class="botones">
                <input type="submit" value="Enviar mensaje" />
                <input type="reset" value="Borrar" />
              </div>
            </form>
          </div>
        </section>
      </div>
    </main>

    <!-- Footer de la pagina -->
    <footer id="main-footer"class="footer"></footer>
    <!-- Scripts -->
    <script type="module" src="../js/main.js"></script>
  </body>
</html>
